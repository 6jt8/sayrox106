name: Generate Profile
on:
  push:
    branches: [main, master]
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate unified profile SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USER: 6jt8
        run: node .github/scripts/generate-profile.js

      - name: Set README to single profile SVG
        run: |
          printf '<p align="center">\n  <img src="https://komarev.com/ghpvc/?username=6jt8&label=Profile%%20views&color=0e75b6&style=flat" alt="6jt8" />\n</p>\n\n<p align="center">\n<img src="https://raw.githubusercontent.com/6jt8/6jt8/main/.github/assets/profile.svg" alt="6jt8 Profile" />\n</p>\n' > README.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add --force .github/assets/*.svg README.md
          git diff --staged --quiet || (git commit -m "chore: update profile" && git push)
